<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mama Tee's Kitchen — Dashboard</title>

<style>
  :root {
    --orange: #D85A30;
    --orange-light: #FAECE7;
    --orange-dark: #993C1D;
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --border: #E8E4DF;
    --text: #1A1714;
    --muted: #7A746E;

    --blue-bg: #E6F1FB;
    --blue-text: #185FA5;

    --green-bg: #EAF3DE;
    --green-text: #3B6D11;

    --amber-bg: #FAEEDA;
    --amber-text: #854F0B;

    --red-bg: #FCEBEB;
    --red-text: #A32D2D;

    --purple-bg: #EEEDFE;
    --purple-text: #534AB7;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-icon {
    width: 34px;
    height: 34px;
    background: var(--orange);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .brand-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .brand-sub {
    font-size: 11px;
    color: var(--muted);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .live {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #3B6D11;
    background: var(--green-bg);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% {
      opacity: 1;
    }

    50% {
      opacity: 0.3;
    }
  }

  .refresh-btn {
    font-size: 12px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    cursor: pointer;
    color: var(--muted);
  }

  .refresh-btn:hover {
    background: var(--bg);
  }

  .last-updated {
    font-size: 11px;
    color: var(--muted);
  }

  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .metric-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .metric-value {
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
    color: var(--text);
  }

  .metric-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .metric.highlight .metric-value {
    color: var(--orange);
  }

  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  @media(max-width: 600px) {
    .charts-row {
      grid-template-columns: 1fr;
    }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }

  .bar-row,
  .res-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .bar-label {
    font-size: 12px;
    color: var(--muted);
    width: 80px;
    flex-shrink: 0;
  }

  .res-label {
    font-size: 12px;
    color: var(--muted);
    width: 110px;
    flex-shrink: 0;
  }

  .bar-track,
  .res-track {
    flex: 1;
    background: var(--bg);
    overflow: hidden;
  }

  .bar-track {
    height: 8px;
    border-radius: 4px;
  }

  .res-track {
    height: 6px;
    border-radius: 3px;
  }

  .bar-fill,
  .res-fill {
    height: 100%;
    transition: width 0.8s cubic-bezier(.4, 0, .2, 1);
  }

  .bar-fill {
    border-radius: 4px;
  }

  .res-fill {
    border-radius: 3px;
  }

  .bar-num,
  .res-pct {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    text-align: right;
  }

  .bar-num {
    width: 28px;
  }

  .res-pct {
    width: 36px;
  }

  .log-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .log-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .log-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .fbtn {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .fbtn.active {
    background: var(--orange);
    color: #fff;
    border-color: var(--orange);
  }

  .fbtn:hover:not(.active) {
    background: var(--bg);
  }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child {
    border-bottom: none;
  }

  tbody tr:hover {
    background: #FBF9F7;
  }

  td {
    padding: 11px 16px;
    vertical-align: middle;
  }

  .td-name {
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }

  .td-detail {
    color: var(--muted);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .td-time {
    color: var(--muted);
    white-space: nowrap;
    font-size: 12px;
  }

  .td-area {
    color: var(--muted);
    font-size: 12px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .b-order {
    background: var(--blue-bg);
    color: var(--blue-text);
  }

  .b-reservation {
    background: var(--green-bg);
    color: var(--green-text);
  }

  .b-faq {
    background: var(--amber-bg);
    color: var(--amber-text);
  }

  .b-callback {
    background: var(--red-bg);
    color: var(--red-text);
  }

  .b-other {
    background: var(--bg);
    color: var(--muted);
  }

  .b-new {
    background: var(--blue-bg);
    color: var(--blue-text);
  }

  .b-pending {
    background: var(--amber-bg);
    color: var(--amber-text);
  }

  .b-completed {
    background: var(--green-bg);
    color: var(--green-text);
  }

  .b-contacted {
    background: var(--purple-bg);
    color: var(--purple-text);
  }

  .empty,
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
  }

  .error-msg {
    background: var(--red-bg);
    color: var(--red-text);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .footer {
    text-align: center;
    padding: 24px;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🍽</div>

    <div>
      <div class="brand-name">Mama Tee's Kitchen</div>
      <div class="brand-sub">Voice concierge dashboard</div>
    </div>
  </div>

  <div class="topbar-right">
    <span class="last-updated" id="last-updated">Loading...</span>

    <div class="live">
      <span class="live-dot"></span>
      Live
    </div>

    <button class="refresh-btn" onclick="fetchData()">
      ↻ Refresh
    </button>
  </div>
</div>

<div class="main">

  <div class="error-msg" id="error-msg"></div>

  <div class="metrics" id="metrics">
    <div class="loading">Loading metrics...</div>
  </div>

  <div class="charts-row">

    <div class="card">
      <div class="card-title">Calls by intent</div>

      <div id="intent-chart">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Resolution overview</div>

      <div id="resolution-chart">
        <div class="loading">Loading...</div>
      </div>
    </div>

  </div>

  <div class="log-section">

    <div class="log-header">
      <span class="log-title">Recent calls</span>

      <div class="filters" id="filters"></div>
    </div>

    <div class="table-wrap">

      <table>

        <thead>
          <tr>
            <th>Time</th>
            <th>Customer</th>
            <th>Details</th>
            <th>Intent</th>
            <th>Area</th>
            <th>Status</th>
            <th>Resolution</th>
          </tr>
        </thead>

        <tbody id="log-body">
          <tr>
            <td colspan="7" class="loading">
              Loading call logs...
            </td>
          </tr>
        </tbody>

      </table>

    </div>
  </div>
</div>

<div class="footer">
  Mama Tee's Kitchen · AI Voice Concierge · Auto-refreshes every 30 seconds
</div>

<script>
  // ============================================================
  // PUT YOUR LIVE N8N WEBHOOK URL HERE
  // ============================================================

  const N8N_URL = "https://pinnacletech.app.n8n.cloud/webhook/mamatee-dashboard-data";

  // ============================================================

  let activeFilter = "all";
  let currentData = null;

  function formatTime(timestamp) {
    if (!timestamp) return "—";

    try {
      const date = new Date(timestamp);

      return (
        date.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit"
        }) +
        " · " +
        date.toLocaleDateString("en-GB", {
          day: "2-digit",
          month: "short"
        })
      );
    } catch (error) {
      return timestamp;
    }
  }

  function intentBadge(intent) {
    const classes = {
      order: "b-order",
      reservation: "b-reservation",
      faq: "b-faq",
      callback_request: "b-callback",
      other: "b-other"
    };

    const labels = {
      order: "Order",
      reservation: "Reservation",
      faq: "FAQ",
      callback_request: "Callback",
      other: "Other"
    };

    return `
      <span class="badge ${classes[intent] || "b-other"}">
        ${labels[intent] || intent}
      </span>
    `;
  }

  function statusBadge(status) {
    const classes = {
      new: "b-new",
      pending: "b-pending",
      completed: "b-completed",
      contacted: "b-contacted"
    };

    return `
      <span class="badge ${classes[status] || "b-new"}">
        ${status || "new"}
      </span>
    `;
  }

  function renderMetrics(stats) {
    document.getElementById("metrics").innerHTML = `
      <div class="metric">
        <div class="metric-label">Total calls</div>
        <div class="metric-value">${stats.total}</div>
        <div class="metric-sub">All time</div>
      </div>

      <div class="metric highlight">
        <div class="metric-label">Orders</div>
        <div class="metric-value">${stats.orders}</div>
        <div class="metric-sub">Captured</div>
      </div>

      <div class="metric">
        <div class="metric-label">Reservations</div>
        <div class="metric-value">${stats.reservations}</div>
        <div class="metric-sub">Logged</div>
      </div>

      <div class="metric">
        <div class="metric-label">FAQs</div>
        <div class="metric-value">${stats.faqs}</div>
        <div class="metric-sub">Resolved</div>
      </div>

      <div class="metric">
        <div class="metric-label">Callbacks</div>
        <div class="metric-value">${stats.callbacks}</div>
        <div class="metric-sub">Pending</div>
      </div>

      <div class="metric">
        <div class="metric-label">Auto-resolved</div>
        <div class="metric-value">${stats.resolutionRate}%</div>
        <div class="metric-sub">By Tee</div>
      </div>
    `;
  }

  function renderIntentChart(logs) {
    const counts = {
      order: 0,
      faq: 0,
      reservation: 0,
      callback_request: 0
    };

    logs.forEach((row) => {
      if (counts[row.intent_type] !== undefined) {
        counts[row.intent_type]++;
      }
    });

    const max = Math.max(...Object.values(counts), 1);

    const colors = {
      order: "#378ADD",
      faq: "#EF9F27",
      reservation: "#639922",
      callback_request: "#E24B4A"
    };

    const labels = {
      order: "Orders",
      faq: "FAQs",
      reservation: "Reservations",
      callback_request: "Callbacks"
    };

    document.getElementById("intent-chart").innerHTML =
      Object.entries(counts)
      .map(([key, value]) => `
        <div class="bar-row">
          <span class="bar-label">${labels[key]}</span>

          <div class="bar-track">
            <div
              class="bar-fill"
              style="
                width:${Math.round((value / max) * 100)}%;
                background:${colors[key]}
              ">
            </div>
          </div>

          <span class="bar-num">${value}</span>
        </div>
      `)
      .join("");
  }

  function renderResolutionChart(logs) {
    const total = logs.length || 1;

    const resolved = logs.filter(
      row => row.assistant_resolution === "resolved"
    ).length;

    const callback = logs.filter(
      row => row.assistant_resolution === "callback_needed"
    ).length;

    const newCount = logs.filter(
      row => row.status === "new"
    ).length;

    const pending = logs.filter(
      row => row.status === "pending"
    ).length;

    const completed = logs.filter(
      row => row.status === "completed"
    ).length;

    document.getElementById("resolution-chart").innerHTML = `
      <div class="res-row">
        <span class="res-label">Auto-resolved</span>

        <div class="res-track">
          <div
            class="res-fill"
            style="
              width:${Math.round((resolved / total) * 100)}%;
              background:#639922;
            ">
          </div>
        </div>

        <span class="res-pct">
          ${Math.round((resolved / total) * 100)}%
        </span>
      </div>

      <div class="res-row">
        <span class="res-label">Callback needed</span>

        <div class="res-track">
          <div
            class="res-fill"
            style="
              width:${Math.round((callback / total) * 100)}%;
              background:#E24B4A;
            ">
          </div>
        </div>

        <span class="res-pct">
          ${Math.round((callback / total) * 100)}%
        </span>
      </div>

      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0">

      <div class="res-row">
        <span class="res-label">New</span>

        <div class="res-track">
          <div
            class="res-fill"
            style="
              width:${Math.round((newCount / total) * 100)}%;
              background:#378ADD;
            ">
          </div>
        </div>

        <span class="res-pct">${newCount}</span>
      </div>

      <div class="res-row">
        <span class="res-label">Pending</span>

        <div class="res-track">
          <div
            class="res-fill"
            style="
              width:${Math.round((pending / total) * 100)}%;
              background:#EF9F27;
            ">
          </div>
        </div>

        <span class="res-pct">${pending}</span>
      </div>

      <div class="res-row">
        <span class="res-label">Completed</span>

        <div class="res-track">
          <div
            class="res-fill"
            style="
              width:${Math.round((completed / total) * 100)}%;
              background:#639922;
            ">
          </div>
        </div>

        <span class="res-pct">${completed}</span>
      </div>
    `;
  }

  function renderFilters() {
    const intents = [
      "all",
      "order",
      "reservation",
      "faq",
      "callback_request"
    ];

    const labels = {
      all: "All",
      order: "Orders",
      reservation: "Reservations",
      faq: "FAQs",
      callback_request: "Callbacks"
    };

    document.getElementById("filters").innerHTML =
      intents.map(intent => `
        <button
          class="fbtn${intent === activeFilter ? " active" : ""}"
          onclick="setFilter('${intent}')"
        >
          ${labels[intent]}
        </button>
      `).join("");
  }

  function renderLogs(logs) {
    const filtered =
      activeFilter === "all"
        ? logs
        : logs.filter(row => row.intent_type === activeFilter);

    if (!filtered.length) {
      document.getElementById("log-body").innerHTML = `
        <tr>
          <td colspan="7" class="empty">
            No calls found for this filter
          </td>
        </tr>
      `;

      return;
    }

    document.getElementById("log-body").innerHTML =
      filtered.map((row) => {

        const detail =
          row.order_or_reservation_details ||
          row.unhandled_question ||
          "—";

        return `
          <tr>

            <td class="td-time">
              ${formatTime(row.timestamp)}
            </td>

            <td>
              <div class="td-name">
                ${row.customer_name || "Unknown"}
              </div>

              <div style="font-size:11px;color:var(--muted)">
                ${row.customer_phone || row.caller_phone || ""}
              </div>
            </td>

            <td class="td-detail" title="${detail}">
              ${detail}
            </td>

            <td>
              ${intentBadge(row.intent_type)}
            </td>

            <td class="td-area">
              ${row.delivery_area || "—"}
            </td>

            <td>
              ${statusBadge(row.status)}
            </td>

            <td>
              <span
                style="
                  font-size:11px;
                  color:${
                    row.assistant_resolution === "resolved"
                      ? "var(--green-text)"
                      : "var(--amber-text)"
                  }
                "
              >
                ${
                  row.assistant_resolution === "resolved"
                    ? "✓ Resolved"
                    : "↩ Callback"
                }
              </span>
            </td>

          </tr>
        `;
      }).join("");
  }

  function setFilter(filter) {
    activeFilter = filter;

    renderFilters();

    if (currentData) {
      renderLogs(currentData.logs);
    }
  }

  function render(data) {
    currentData = data;

    renderMetrics(data.stats);
    renderIntentChart(data.logs);
    renderResolutionChart(data.logs);
    renderFilters();
    renderLogs(data.logs);

    document.getElementById("last-updated").textContent =
      "Updated " +
      new Date().toLocaleTimeString("en-GB", {
        hour: "2-digit",
        minute: "2-digit"
      });
  }

  function buildStats(logs) {
    return {
      total: logs.length,

      orders: logs.filter(
        row => row.intent_type === "order"
      ).length,

      reservations: logs.filter(
        row => row.intent_type === "reservation"
      ).length,

      faqs: logs.filter(
        row => row.intent_type === "faq"
      ).length,

      callbacks: logs.filter(
        row => row.intent_type === "callback_request"
      ).length,

      resolutionRate: logs.length
        ? Math.round(
            (
              logs.filter(
                row => row.assistant_resolution === "resolved"
              ).length / logs.length
            ) * 100
          )
        : 0
    };
  }

  async function fetchData() {
    try {

      const response = await fetch(N8N_URL, {
        method: "GET",
        headers: {
          "Content-Type": "application/json"
        }
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const raw = await response.json();

      console.log("RAW N8N RESPONSE:", raw);

      let logs = [];

      // =========================================
      // HANDLE DIFFERENT N8N RESPONSE FORMATS
      // =========================================

      if (Array.isArray(raw)) {

        // Format 1: direct array of logs
        if (raw.length && raw[0].timestamp) {
          logs = raw;
        }

        // Format 2: [{json:{}}]
        else if (raw[0]?.json?.logs) {
          logs = raw[0].json.logs;
        }

        // Format 3: [{logs:[...]}]
        else if (raw[0]?.logs) {
          logs = raw[0].logs;
        }
      }

      // Format 4: {logs:[...]}
      else if (raw.logs) {
        logs = raw.logs;
      }

      // Format 5: {data:[...]}
      else if (raw.data) {
        logs = raw.data;
      }

      // Format 6: single object
      else if (raw.timestamp) {
        logs = [raw];
      }

      // =========================================

      if (!Array.isArray(logs)) {
        throw new Error("Logs data is not an array");
      }

      const data = {
        stats: buildStats(logs),
        logs: logs
      };

      document.getElementById("error-msg").style.display = "none";

      render(data);

    } catch (error) {

      console.error(error);

      document.getElementById("error-msg").style.display = "block";

      document.getElementById("error-msg").innerHTML = `
        ⚠️ Failed to fetch live n8n data.<br><br>
        Error: ${error.message}<br><br>

        Check:
        <br>
        • n8n workflow is ACTIVE
        <br>
        • webhook URL is correct
        <br>
        • webhook returns JSON
        <br>
        • CORS is enabled
      `;

      document.getElementById("metrics").innerHTML = `
        <div class="empty">
          Failed to load dashboard data
        </div>
      `;

      document.getElementById("intent-chart").innerHTML = `
        <div class="empty">
          No chart data
        </div>
      `;

      document.getElementById("resolution-chart").innerHTML = `
        <div class="empty">
          No resolution data
        </div>
      `;

      document.getElementById("log-body").innerHTML = `
        <tr>
          <td colspan="7" class="empty">
            No live data available
          </td>
        </tr>
      `;
    }
  }

  // Initial load
  fetchData();

  // Auto refresh every 30 seconds
  setInterval(fetchData, 30000);
</script>

</body>
</html>
